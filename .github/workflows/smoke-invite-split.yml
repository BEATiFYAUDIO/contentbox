name: smoke-invite-split

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/api/package-lock.json

      - name: Install API dependencies
        run: npm --prefix apps/api ci

      - name: Generate Prisma client
        run: npm --prefix apps/api run prisma:generate

      - name: Run invite/split smoke flow
        run: ./scripts/smoke-invite-split.sh

